name: Update README

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜0時（UTC）に自動実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: About説明文が未設定のリポジトリにREADMEから自動設定
        env:
          # 説明の読み取りだけでなく repo edit (Administration write) が必要なため
          # secrets.GH_PAT には Administration: Read and write 権限も付与しておくこと
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, re, base64

          OWNER = "SOOJUNBARNG"

          repos = json.loads(subprocess.run(
              ["gh", "repo", "list", OWNER, "--limit", "200", "--json", "name,description"],
              capture_output=True, text=True, check=True
          ).stdout)

          missing = [r["name"] for r in repos if not r.get("description")]
          print(f"About未設定: {len(missing)}件")

          # 説明文として使わない(コード/URL/ボイラープレート/シークレットらしき行)を弾くルール
          secret_pattern = re.compile(
              r"AIza[0-9A-Za-z_\-]{20,}|sk-[A-Za-z0-9]{20,}|gh[pousr]_[A-Za-z0-9]{30,}"
              r"|AKIA[0-9A-Z]{12,}|eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}"
          )
          code_pattern = re.compile(
              r"^(//|#!|const |import |function |class |def |gcloud |pip install|npm |pyinstaller|\$)"
          )
          boilerplate_snippets = [
              "a new flutter project",
              "bootstrapped with",
              "getting started",
              "this is a next.js project",
          ]

          def extract_description(owner, repo):
              result = subprocess.run(
                  ["gh", "api", f"repos/{owner}/{repo}/readme", "--jq", ".content"],
                  capture_output=True, text=True
              )
              if result.returncode != 0 or not result.stdout.strip():
                  return None, None
              try:
                  text = base64.b64decode(result.stdout.strip()).decode("utf-8", "ignore")
              except Exception:
                  return None, None

              in_code_block = False
              for raw_line in text.split("\n"):
                  line = raw_line.strip()
                  if line.startswith("```"):
                      in_code_block = not in_code_block
                      continue
                  if in_code_block or not line:
                      continue
                  if line.startswith(("#", "![", "[", "<", "---", "===")):
                      continue
                  if secret_pattern.search(line):
                      return None, "secret-like-string-detected"
                  if code_pattern.match(line):
                      continue
                  if line.lower().startswith("http"):
                      continue
                  clean = re.sub(r"[*_`]", "", line).strip()
                  if len(clean) < 8:
                      continue
                  if any(b in clean.lower() for b in boilerplate_snippets):
                      continue
                  if len(clean) > 140:
                      clean = clean[:137] + "..."
                  return clean, None
              return None, None

          applied, skipped, alerts = [], [], []
          for name in missing:
              desc, reason = extract_description(OWNER, name)
              if reason == "secret-like-string-detected":
                  alerts.append(name)
                  continue
              if not desc:
                  skipped.append(name)
                  continue
              edit = subprocess.run(
                  ["gh", "repo", "edit", f"{OWNER}/{name}", "--description", desc],
                  capture_output=True, text=True
              )
              if edit.returncode == 0:
                  applied.append((name, desc))
              else:
                  print(f"⚠️ 設定失敗: {name}: {edit.stderr.strip()}")

          print(f"✅ 自動設定: {len(applied)}件")
          for name, desc in applied:
              print(f"  - {name}: {desc}")
          print(f"⏭️ スキップ(候補抽出不可): {len(skipped)}件")
          if alerts:
              print(f"🚨 README内にシークレットらしき文字列を検出したためスキップ: {alerts}")
              print("::warning::README内にAPIキー等のシークレットらしき文字列を検出しました。該当リポジトリを確認し、必要ならキーをローテーションしてください。")
          PYEOF

      - name: 全リポジトリ取得 & README生成
        env:
          # GITHUB_TOKEN はこのリポジトリにスコープされ非公開リポジトリを一覧できないため、
          # repo スコープを持つ PAT (secrets.GH_PAT) を使用する
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh repo list SOOJUNBARNG --limit 100 --json name,description,url,updatedAt,isPrivate > /tmp/repos.json

          python3 << 'PYEOF'
          import json
          from datetime import datetime

          with open('/tmp/repos.json') as f:
              repos = json.load(f)

          # カテゴリ分類ルール
          categories = {
              "🏥 医療・病院系": ["hospital", "doctor", "medical", "shift", "ocr", "jpix", "dentist"],
              "🏢 クリニック・法人HP系": ["clinic", "homecare", "healthcare", "akatsuki", "tooth", "MedicalBarng"],
              "👔 鳩ヶ谷系": ["hatogaya", "Hatogaya"],
              "💬 LINE・通知系": ["LINE", "line", "mail", "email"],
              "🤖 AI・自動化系": ["ai", "AI", "voice", "video", "yolo", "Yolo", "novel", "PPT", "nano", "diary", "translation", "route"],
              "📊 データ・スクレイピング系": ["scrap", "Scrap", "asset", "Asset", "jordan", "area", "Area", "geo", "Geo", "TCB", "text", "Text", "visualization"],
              "💰 財務・経理系": ["financial", "receipt", "stock", "Stock", "kenseikai", "Kenseikai"],
              "🌐 Web・フロントエンド系": ["digital", "Digital", "fortune", "Fortune", "job_hunting", "gdp", "next-platform", "javascript", "clear", "Clear", "sinage", "Sinage"],
              "🔧 ツール・管理系": ["git_control", "CLI", "chromium", "upload", "download", "graphbiz", "Graphbiz", "general"],
              "👤 個人・キャリア系": ["resume", "career", "hackerton", "typescript", "Typescript", "writing", "Writing", "youtube", "Youtube"],
              "🏬 その他法人・外部案件": ["ser_inc", "MA_Techno", "YRC", "sake", "Sake", "azuma-jotform", "hatogaya_jotform", "job_quit", "Job_quit", "negishi", "Negishi", "tokiwa", "Tokiwa"],
          }

          def get_category(name):
              for cat, keywords in categories.items():
                  for kw in keywords:
                      if kw.lower() in name.lower():
                          return cat
              return "📦 その他"

          grouped = {}
          for repo in repos:
              cat = get_category(repo['name'])
              grouped.setdefault(cat, []).append(repo)

          now = datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
          total = len(repos)

          lines = []
          lines.append("# 🗂️ git_control — SOOJUNBARNG リポジトリ管理")
          lines.append("")
          lines.append(f"> 最終更新: {now} | 合計: {total}件")
          lines.append("")
          lines.append("全リポジトリの一覧・管理スクリプトをまとめたハブリポジトリ。**このREADMEは毎日自動更新されます。**")
          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append("## 📊 GitHub Stats")
          lines.append("")
          lines.append("[![GitHub Streak](https://streak-stats.demolab.com/?user=SOOJUNBARNG&theme=aura_dark&hide_border=true&locale=ja)](https://git.io/streak-stats)")
          lines.append("")
          lines.append("| Overview | Languages |")
          lines.append("|----------|-----------|")
          lines.append("| ![](./profile-summary-card-output/aura_dark/0-profile-details.svg) | ![](./profile-summary-card-output/aura_dark/2-most-commit-language.svg) |")
          lines.append("")
          lines.append("| Repos per Language | Stats per Language | Productive Time |")
          lines.append("|--------------------|--------------------|-----------------|")
          lines.append("| ![](./profile-summary-card-output/aura_dark/1-repos-per-language.svg) | ![](./profile-summary-card-output/aura_dark/3-stats.svg) | ![](./profile-summary-card-output/aura_dark/4-productive-time.svg) |")
          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append("## 使い方")
          lines.append("")
          lines.append("```bash")
          lines.append("./scripts/status.sh   # 全リポジトリの状態確認")
          lines.append("./scripts/pull_all.sh  # 全リポジトリを最新に更新")
          lines.append("./scripts/list.sh      # リポジトリ一覧を表示")
          lines.append("```")
          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append(f"## リポジトリ一覧 ({total}件)")

          for cat, cat_repos in grouped.items():
              lines.append("")
              lines.append(f"### {cat}")
              lines.append("")
              lines.append("| リポジトリ | 公開 | 説明 | 最終更新 | リンク |")
              lines.append("|-----------|------|------|----------|--------|")
              for r in sorted(cat_repos, key=lambda x: x['updatedAt'], reverse=True):
                  priv = "🔒" if r['isPrivate'] else "🌐"
                  desc = r['description'] or "—"
                  updated = r['updatedAt'][:10]
                  lines.append(f"| {r['name']} | {priv} | {desc} | {updated} | [link]({r['url']}) |")

          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append("🔒 = プライベート　🌐 = パブリック")

          with open('README.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print(f"✅ README生成完了: {total}件")
          PYEOF

      - name: 変更があればcommit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "変更なし — スキップ"
          else
            git commit -m "chore: README自動更新 $(date -u +%Y-%m-%d)"
            git push
          fi
